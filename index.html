<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>MolarPrep | Host Cell</title>

  <!-- PWA / Mobile -->
  <meta name="theme-color" content="#050607" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MolarPrep" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="manifest" href="./manifest.json" />

  <!-- Social preview -->
  <meta property="og:title" content="MolarPrep | Host Cell" />
  <meta property="og:description" content="Tool for molarity and stock solution calculations." />
  <meta property="og:image" content="./og-image.png" />

  <style>
    /* =========================
       DESIGN TOKENS (MolarPrep)
       ========================= */
    :root {
      --bg-main: #050607;
      --bg-card: #111417;
      --bg-input: #1b2126;
      --bg-soft: #0b0f12;

      --accent: #66efff;
      --accent-strong: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.18);

      --text-pri: #eefbff;
      --text-sec: #9bb1b8;
      --text-dim: #6f838a;

      --border-color: #24313a;
      --border-soft: rgba(102, 239, 255, 0.08);

      --danger: #ef5350;
      --danger-glow: rgba(239, 83, 80, 0.16);

      --radius: 12px;
      --radius-sm: 8px;
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.25);
      --maxw: 1100px;
    }

    /* =========================
       BASE
       ========================= */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "Courier New", Courier, monospace;
      color: var(--text-pri);
      background:
        radial-gradient(circle at 10% 10%, rgba(0, 229, 255, 0.05), transparent 40%),
        radial-gradient(circle at 90% 20%, rgba(102, 239, 255, 0.04), transparent 35%),
        linear-gradient(180deg, #050607 0%, #07090b 100%);
      line-height: 1.4;
      padding: 20px;
    }

    .u {
      font-family: Arial, sans-serif;
      text-transform: none !important;
    }

    .container {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    /* =========================
       HEADER
       ========================= */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin: 0 auto 18px auto;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border-color);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid rgba(102, 239, 255, 0.18);
      box-shadow: 0 0 18px rgba(0, 229, 255, 0.22);
      background: rgba(255, 255, 255, 0.01);
      flex-shrink: 0;
    }

    .header-title {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 1.85rem;
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.08);
    }

    .header-subtitle {
      margin-top: 4px;
      color: var(--text-sec);
      font-size: 0.8rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .lang-switch {
      font-weight: bold;
      color: var(--text-sec);
      user-select: none;
    }

    .lang-switch button {
      background: transparent;
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      padding: 0;
      text-transform: uppercase;
    }

    .lang-switch button.active {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.28);
    }

    .btn-clear,
    .btn-docs,
    .btn-action {
      font-family: inherit;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: 0.2s ease;
    }

    .btn-clear {
      background: transparent;
      color: var(--text-sec);
      border: 1px solid var(--text-sec);
      padding: 7px 12px;
      font-size: 0.8rem;
    }

    .btn-clear:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
      box-shadow: 0 0 0 3px var(--danger-glow);
    }

    .btn-docs {
      background: var(--bg-input);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .btn-docs:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #install-btn {
      border-color: var(--accent);
      color: var(--accent);
      animation: pulse-cyan 2s infinite;
    }

    #install-btn[hidden] {
      display: none !important;
    }

    @keyframes pulse-cyan {
      0%   { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.35); }
      70%  { box-shadow: 0 0 0 8px rgba(0, 229, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
    }

    /* =========================
       GRID + CARDS
       ========================= */
    .app-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin: 0 auto;
    }

    @media (min-width: 900px) {
      .app-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0)),
        var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      box-shadow: inset 0 0 0 1px rgba(102, 239, 255, 0.015);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card.is-invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px var(--danger-glow);
    }

    .card-title {
      margin: 0 0 16px 0;
      color: var(--text-pri);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-hint {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin: -4px 0 14px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .row-group {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .row-group .grow {
      flex: 1;
    }

    .row-group .shrink {
      flex: 0.6;
      min-width: 92px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-sec);
      font-size: 0.78rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-pri);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #7e9097;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-action {
      width: 100%;
      margin-top: auto;
      padding: 14px;
      background: var(--bg-input);
      color: var(--accent);
      border: 1px solid var(--accent);
      font-weight: bold;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }

    .btn-action:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* =========================
       RESULTS
       ========================= */
    .results-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      border: 1px dashed var(--accent);
      background: var(--accent-glow);
      text-align: center;
      display: none;
    }

    .results-box.is-visible {
      display: block;
    }

    .results-box.is-error {
      border-color: var(--danger);
      background: var(--danger-glow);
    }

    .res-label {
      font-size: 0.78rem;
      color: var(--text-sec);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }

    .res-val {
      font-size: 1.55rem;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.16);
      word-break: break-word;
    }

    .results-box.is-error .res-val {
      color: #ff8a80;
      text-shadow: none;
    }

    /* =========================
       FOOTER
       ========================= */
    .footer-info {
      margin: 34px auto 18px auto;
      padding-top: 18px;
      border-top: 1px solid var(--border-color);
    }

    .author-box {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: var(--text-sec);
      font-size: 0.82rem;
    }

    .author-box strong {
      color: var(--text-pri);
    }

    /* =========================
       MOBILE
       ========================= */
    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      .header-container {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        align-items: flex-start;
      }

      .brand-logo {
        width: 48px;
        height: 48px;
      }

      .header-title {
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header-container">
      <div class="brand">
        <img src="./icon-192.png" alt="MolarPrep logo" class="brand-logo" />
        <div>
          <h1 class="header-title">MolarPrep</h1>
          <div class="header-subtitle">Host Cell Lab Tools</div>
        </div>
      </div>

      <div class="controls">
        <div class="lang-switch" aria-label="Language selector">
          <button id="lang-es" class="active" type="button">ES</button>
          <span aria-hidden="true"> | </span>
          <button id="lang-en" type="button">EN</button>
        </div>

        <a
          href="https://github.com/ebalderasr/MolarPrep"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-docs"
          id="btn-docs"
          data-i18n="btnDocs"
        >
          [ Documentación ]
        </a>

        <button class="btn-clear" id="btn-clear" type="button" data-i18n="btnClear">
          [ Limpiar ]
        </button>

        <button class="btn-clear" id="install-btn" type="button" hidden data-i18n="btnInstall">
          [ Instalar ]
        </button>
      </div>
    </header>



    <!-- Main App -->
    <main class="app-grid">
      <!-- Card 1: Solids -->
      <section class="card" id="card-solids">
        <h2 class="card-title" data-i18n="card1Title">01. Reactivos Sólidos</h2>
        <div class="card-hint" data-i18n="card1Hint">m = M × V × PM</div>

        <div class="input-group">
          <label for="s_mw" data-i18n="lblMW">Peso Molecular</label>
          <input type="number" id="s_mw" placeholder="g/mol" min="0.0001" step="any" />
        </div>

        <div class="input-group">
          <label for="s_m" data-i18n="lblMolarity">Molaridad Meta</label>
          <div class="row-group">
            <input class="grow" type="number" id="s_m" placeholder="0.0" min="0.0001" step="any" />
            <select class="shrink" id="s_m_u" aria-label="Unidad de molaridad">
              <option value="1">M</option>
              <option value="0.001">mM</option>
              <option value="0.000001">μM</option>
              <option value="0.000000001">nM</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label for="s_v" data-i18n="lblVol">Volumen Final</label>
          <div class="row-group">
            <input class="grow" type="number" id="s_v" placeholder="0.0" min="0.0001" step="any" />
            <select class="shrink" id="s_v_u" aria-label="Unidad de volumen">
              <option value="1">L</option>
              <option value="0.001">mL</option>
            </select>
          </div>
        </div>

        <button class="btn-action" id="btn-calc-solids" type="button" data-i18n="btnCalcMass">
          Calcular Masa
        </button>

        <div class="results-box" id="box-mass" aria-live="polite">
          <div class="res-label" data-i18n="resMass">Masa Requerida</div>
          <div class="res-val" id="out_mass">---</div>
        </div>
      </section>

      <!-- Card 2: Liquids -->
      <section class="card" id="card-liquids">
        <h2 class="card-title" data-i18n="card2Title">02. Reactivos Líquidos</h2>
        <div class="card-hint" data-i18n="card2Hint">M1V1 = M2V2</div>

        <div class="input-group">
          <label data-i18n="lblStock">Densidad (ρ) y % Pureza</label>
          <div class="row-group">
            <input class="grow" type="number" id="l_rho" placeholder="g/mL" min="0.0001" step="any" />
            <input class="grow" type="number" id="l_p" placeholder="%" min="0.0001" max="100" step="any" />
          </div>
        </div>

        <div class="input-group">
          <label for="l_mw" data-i18n="lblMW">Peso Molecular</label>
          <input type="number" id="l_mw" placeholder="g/mol" min="0.0001" step="any" />
        </div>

        <div class="row-group">
          <div class="input-group grow">
            <label for="l_m2" data-i18n="lblTargetM">M Meta (M)</label>
            <input type="number" id="l_m2" placeholder="0.0" min="0.0001" step="any" />
          </div>
          <div class="input-group grow">
            <label for="l_v2" data-i18n="lblTargetV">V Meta (mL)</label>
            <input type="number" id="l_v2" placeholder="0.0" min="0.0001" step="any" />
          </div>
        </div>

        <button class="btn-action" id="btn-calc-liquids" type="button" data-i18n="btnCalcStock">
          Calcular Stock
        </button>

        <div class="results-box" id="box-vol" aria-live="polite">
          <div class="res-label" data-i18n="resVol">Volumen de Stock</div>
          <div class="res-val" id="out_vol">---</div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer-info">
      <div class="author-box">
        <strong data-i18n="lblAuthor">Autor: Emiliano Balderas</strong><br />
        <span data-i18n="authorBio">
          Ingeniero en Biotecnología | Estudiante de Doctorado en Bioquímica, IBt-UNAM
        </span>
      </div>
    </footer>
  </div>

  <script>
    /**
     * ============================
     * MolarPrep Front-End Script
     * ============================
     * Goals:
     * - Keep calculation logic simple and easy to edit
     * - Separate UI helpers from math functions
     * - Make translations explicit and centralized
     */

    const APP = {
      defaultLanguage: "es",
      currentLanguage: "es",
      deferredInstallPrompt: null,
    };

    const I18N = {
      es: {
        btnDocs: "[ Documentación ]",
        btnClear: "[ Limpiar ]",
        btnInstall: "[ Instalar ]",

        card1Title: "01. Reactivos Sólidos",
        card1Hint: "m = M × V × PM",
        card2Title: "02. Reactivos Líquidos",
        card2Hint: "M1V1 = M2V2",

        lblMW: "Peso Molecular",
        lblMolarity: "Molaridad Meta",
        lblVol: "Volumen Final",
        lblStock: "Densidad (ρ) y % Pureza",
        lblTargetM: "M Meta (M)",
        lblTargetV: "V Meta (mL)",

        btnCalcMass: "Calcular Masa",
        btnCalcStock: "Calcular Stock",

        resMass: "Masa Requerida",
        resVol: "Volumen de Stock",

        lblAuthor: "Autor: Emiliano Balderas",
        authorBio: "Ingeniero en Biotecnología | Estudiante de Doctorado en Bioquímica, IBt-UNAM",

        err: "ERR",
      },

      en: {
        btnDocs: "[ Documentation ]",
        btnClear: "[ Clear ]",
        btnInstall: "[ Install ]",

        card1Title: "01. Solid Reagents",
        card1Hint: "m = M × V × MW",
        card2Title: "02. Liquid Reagents",
        card2Hint: "M1V1 = M2V2",

        lblMW: "Molecular Weight",
        lblMolarity: "Target Molarity",
        lblVol: "Final Volume",
        lblStock: "Density (ρ) and % Purity",
        lblTargetM: "Target M (M)",
        lblTargetV: "Target V (mL)",

        btnCalcMass: "Calculate Mass",
        btnCalcStock: "Calculate Stock",

        resMass: "Required Mass",
        resVol: "Stock Volume",

        lblAuthor: "Author: Emiliano Balderas",
        authorBio: "Biotechnology Engineer | PhD Student in Biochemistry, IBt-UNAM",

        err: "ERR",
      },
    };

    /**
     * DOM map
     * Keep IDs here to make maintenance easier.
     */
    const DOM = {
      // language
      langEs: document.getElementById("lang-es"),
      langEn: document.getElementById("lang-en"),

      // buttons
      btnClear: document.getElementById("btn-clear"),
      btnInstall: document.getElementById("install-btn"),
      btnCalcSolids: document.getElementById("btn-calc-solids"),
      btnCalcLiquids: document.getElementById("btn-calc-liquids"),

      // cards
      cardSolids: document.getElementById("card-solids"),
      cardLiquids: document.getElementById("card-liquids"),

      // solids inputs
      s_mw: document.getElementById("s_mw"),
      s_m: document.getElementById("s_m"),
      s_m_u: document.getElementById("s_m_u"),
      s_v: document.getElementById("s_v"),
      s_v_u: document.getElementById("s_v_u"),

      // liquids inputs
      l_rho: document.getElementById("l_rho"),
      l_p: document.getElementById("l_p"),
      l_mw: document.getElementById("l_mw"),
      l_m2: document.getElementById("l_m2"),
      l_v2: document.getElementById("l_v2"),

      // outputs
      boxMass: document.getElementById("box-mass"),
      outMass: document.getElementById("out_mass"),
      boxVol: document.getElementById("box-vol"),
      outVol: document.getElementById("out_vol"),
    };

    /* =========================
       Utility functions
       ========================= */

    function t(key) {
      const langPack = I18N[APP.currentLanguage] || I18N[APP.defaultLanguage];
      return langPack[key] ?? key;
    }

    function parsePositiveNumber(element) {
      const value = Number.parseFloat(element.value);
      return Number.isFinite(value) ? value : NaN;
    }

    function isPositiveFinite(value) {
      return Number.isFinite(value) && value > 0;
    }

    /**
     * Auto-format values in g/L using metric prefixes.
     * Examples:
     * - 0.0023 g -> 2.30 mg
     * - 0.0000008 L -> 0.80 µL
     */
    function formatWithMetricPrefix(value, unit) {
      if (!isPositiveFinite(value)) return t("err");

      if (value >= 1) {
        return `${value.toFixed(3)} <span class="u">${unit}</span>`;
      }

      if (value >= 1e-3) {
        return `${(value * 1e3).toFixed(2)} <span class="u">m${unit}</span>`;
      }

      return `${(value * 1e6).toFixed(2)} <span class="u">μ${unit}</span>`;
    }

    function setCardValidity(cardElement, isValid) {
      cardElement.classList.toggle("is-invalid", !isValid);
    }

    function showResult(resultBox, outputElement, html, { isError = false } = {}) {
      outputElement.innerHTML = html;
      resultBox.classList.add("is-visible");
      resultBox.classList.toggle("is-error", isError);
    }

    function hideResult(resultBox, outputElement) {
      outputElement.textContent = "---";
      resultBox.classList.remove("is-visible", "is-error");
    }

    function clearAllResults() {
      hideResult(DOM.boxMass, DOM.outMass);
      hideResult(DOM.boxVol, DOM.outVol);
      setCardValidity(DOM.cardSolids, true);
      setCardValidity(DOM.cardLiquids, true);
    }

    function clearInputs() {
      document.querySelectorAll("input").forEach((input) => {
        input.value = "";
      });

      // Reset select defaults (optional, easy to edit here)
      DOM.s_m_u.value = "1";     // M
      DOM.s_v_u.value = "1";     // L
    }

    function resetApp() {
      clearInputs();
      clearAllResults();
    }

    /* =========================
       Calculation logic
       ========================= */

    /**
     * Solids calculation
     * mass (g) = target_molarity (M) * final_volume (L) * molecular_weight (g/mol)
     */
    function calculateSolids() {
      const molecularWeight = parsePositiveNumber(DOM.s_mw);
      const targetMolarityValue = parsePositiveNumber(DOM.s_m);
      const targetMolarityUnitFactor = Number.parseFloat(DOM.s_m_u.value);
      const finalVolumeValue = parsePositiveNumber(DOM.s_v);
      const finalVolumeUnitFactor = Number.parseFloat(DOM.s_v_u.value);

      const targetMolarity_M = targetMolarityValue * targetMolarityUnitFactor;
      const finalVolume_L = finalVolumeValue * finalVolumeUnitFactor;

      const inputsAreValid = [
        molecularWeight,
        targetMolarity_M,
        finalVolume_L,
      ].every(isPositiveFinite);

      setCardValidity(DOM.cardSolids, inputsAreValid);

      if (!inputsAreValid) {
        showResult(DOM.boxMass, DOM.outMass, t("err"), { isError: true });
        return;
      }

      const requiredMass_g = targetMolarity_M * finalVolume_L * molecularWeight;
      const formatted = formatWithMetricPrefix(requiredMass_g, "g");
      showResult(DOM.boxMass, DOM.outMass, formatted);
    }

    /**
     * Liquids calculation (concentrated liquid stock)
     *
     * Stock concentration in M:
     * M1 = (purity_fraction * density_g_per_mL * 1000 mL/L) / MW_g_per_mol
     *
     * Desired stock volume:
     * V1 = (M2 * V2) / M1
     * Where:
     * - M2 in M
     * - V2 in L
     * - V1 returned in L
     */
    function calculateLiquids() {
      const density_g_mL = parsePositiveNumber(DOM.l_rho);
      const purity_percent = parsePositiveNumber(DOM.l_p);
      const molecularWeight = parsePositiveNumber(DOM.l_mw);
      const targetMolarity_M = parsePositiveNumber(DOM.l_m2);
      const targetVolume_mL = parsePositiveNumber(DOM.l_v2);

      const purity_fraction = purity_percent / 100;
      const targetVolume_L = targetVolume_mL / 1000;

      const purityIsValid = isPositiveFinite(purity_percent) && purity_percent <= 100;

      const inputsAreValid =
        [density_g_mL, molecularWeight, targetMolarity_M, targetVolume_L].every(isPositiveFinite) &&
        purityIsValid;

      setCardValidity(DOM.cardLiquids, inputsAreValid);

      if (!inputsAreValid) {
        showResult(DOM.boxVol, DOM.outVol, t("err"), { isError: true });
        return;
      }

      const stockMolarity_M = (purity_fraction * density_g_mL * 1000) / molecularWeight;

      if (!isPositiveFinite(stockMolarity_M)) {
        showResult(DOM.boxVol, DOM.outVol, t("err"), { isError: true });
        return;
      }

      const requiredStockVolume_L = (targetMolarity_M * targetVolume_L) / stockMolarity_M;
      const formatted = formatWithMetricPrefix(requiredStockVolume_L, "L");
      showResult(DOM.boxVol, DOM.outVol, formatted);
    }

    /* =========================
       Internationalization (i18n)
       ========================= */

    function applyTranslations(language) {
      const langPack = I18N[language] || I18N[APP.defaultLanguage];

      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.getAttribute("data-i18n");
        if (langPack[key]) {
          node.innerHTML = langPack[key];
        }
      });

      DOM.langEs.classList.toggle("active", language === "es");
      DOM.langEn.classList.toggle("active", language === "en");
    }

    function setLanguage(language) {
      if (!I18N[language]) return;
      APP.currentLanguage = language;
      applyTranslations(language);

      // Save preference (safe to remove if not needed)
      try {
        localStorage.setItem("molarprep_lang", language);
      } catch (_) {
        /* no-op */
      }
    }

    function loadSavedLanguage() {
      try {
        const saved = localStorage.getItem("molarprep_lang");
        if (saved && I18N[saved]) {
          APP.currentLanguage = saved;
        }
      } catch (_) {
        /* no-op */
      }
    }

    /* =========================
       PWA Install + Service Worker
       ========================= */

    function setupInstallPrompt() {
      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        APP.deferredInstallPrompt = event;
        DOM.btnInstall.hidden = false;
      });

      DOM.btnInstall.addEventListener("click", async () => {
        if (!APP.deferredInstallPrompt) return;

        APP.deferredInstallPrompt.prompt();
        APP.deferredInstallPrompt = null;

        // Hide button after prompt; can reappear if browser emits event again
        DOM.btnInstall.hidden = true;
      });
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("SW registration failed:", error);
        });
      });
    }

    /* =========================
       Event binding
       ========================= */

    function bindEvents() {
      // Language toggles
      DOM.langEs.addEventListener("click", () => setLanguage("es"));
      DOM.langEn.addEventListener("click", () => setLanguage("en"));

      // Calculations
      DOM.btnCalcSolids.addEventListener("click", calculateSolids);
      DOM.btnCalcLiquids.addEventListener("click", calculateLiquids);

      // Clear form
      DOM.btnClear.addEventListener("click", resetApp);

      // Optional UX: Enter key triggers calculation based on card
      DOM.cardSolids.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          calculateSolids();
        }
      });

      DOM.cardLiquids.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          calculateLiquids();
        }
      });

      // When user edits inputs after an error, clear card invalid state
      document.querySelectorAll("input, select").forEach((field) => {
        field.addEventListener("input", () => {
          const solidsFields = [DOM.s_mw, DOM.s_m, DOM.s_m_u, DOM.s_v, DOM.s_v_u];
          const liquidsFields = [DOM.l_rho, DOM.l_p, DOM.l_mw, DOM.l_m2, DOM.l_v2];

          if (solidsFields.includes(field)) {
            setCardValidity(DOM.cardSolids, true);
            DOM.boxMass.classList.remove("is-error");
          }

          if (liquidsFields.includes(field)) {
            setCardValidity(DOM.cardLiquids, true);
            DOM.boxVol.classList.remove("is-error");
          }
        });
      });
    }

    /* =========================
       App Init
       ========================= */

    function init() {
      loadSavedLanguage();
      applyTranslations(APP.currentLanguage);
      clearAllResults();
      bindEvents();
      setupInstallPrompt();
      registerServiceWorker();
    }

    init();
  </script>
</body>
</html>
